<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NBA Spy</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
:root{--bg:#090909;--card:#111;--border:#1e1e1e;--text:#fff;--muted:#4a4a4a;--spy:#FF6B35;--vh:100svh}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;overflow:hidden}

.screen{
  position:fixed;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:max(28px, env(safe-area-inset-top)) 22px max(28px, env(safe-area-inset-bottom));
  height:var(--tg-viewport-stable-height, var(--vh));
  opacity:0;pointer-events:none;transition:opacity .18s
}
.screen.active{opacity:1;pointer-events:all}

/* ── SETUP ── */
.logo{font-size:3.8rem;font-weight:900;letter-spacing:-4px;line-height:.9;margin-bottom:6px;text-align:center}
.logo span{background:linear-gradient(135deg,#FF8C42,#FF6B35);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.tagline{font-size:.8rem;color:var(--muted);margin-bottom:32px;text-align:center;letter-spacing:1.5px;text-transform:uppercase}
.lbl{font-size:.65rem;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;align-self:flex-start;width:100%;max-width:360px}
.pills{display:flex;gap:7px;width:100%;max-width:360px;margin-bottom:22px}
.pill{flex:1;padding:11px 4px;border:2px solid var(--border);background:transparent;color:var(--muted);border-radius:13px;font-size:.88rem;font-weight:700;cursor:pointer;transition:all .14s;touch-action:manipulation}
.pill.on{border-color:var(--spy);color:var(--spy);background:#130a04}
.pill.diff{font-size:1rem}
.cnt-row{display:flex;align-items:center;justify-content:center;gap:18px;width:100%;max-width:360px;margin-bottom:28px}
.cnt-btn{width:50px;height:50px;border:2px solid var(--border);background:transparent;color:#fff;font-size:1.5rem;border-radius:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:manipulation;transition:border-color .12s,background .12s}
.cnt-btn:active{border-color:var(--spy);background:#130a04}
.cnt-num{font-size:2.6rem;font-weight:900;min-width:52px;text-align:center}
.btn{width:100%;max-width:360px;padding:18px;background:linear-gradient(135deg,#FF8C42,#FF6B35);color:#fff;border:none;border-radius:18px;font-size:1.05rem;font-weight:800;cursor:pointer;letter-spacing:.4px;touch-action:manipulation;transition:transform .1s,opacity .1s;box-shadow:0 4px 24px rgba(255,107,53,.3)}
.btn:active{transform:scale(.98);opacity:.9}
.btn-ghost{background:transparent;color:var(--muted);border:2px solid var(--border);box-shadow:none;margin-top:11px;font-weight:600;font-size:1rem}
.btn-ghost:active{border-color:#555}
.btn-jazz{display:none;width:100%;max-width:360px;padding:18px;background:linear-gradient(135deg,#6B2D8B,#F9A01B);color:#fff;border:none;border-radius:18px;font-size:1.05rem;font-weight:800;cursor:pointer;margin-top:11px;touch-action:manipulation;letter-spacing:.5px;box-shadow:0 4px 20px rgba(107,45,139,.35)}
.btn-jazz:active{transform:scale(.98);opacity:.9}
@keyframes eggPop{0%{transform:scale(0) rotate(-10deg);opacity:0}70%{transform:scale(1.08) rotate(2deg)}100%{transform:scale(1) rotate(0deg);opacity:1}}
.egg-appear{animation:eggPop .45s cubic-bezier(.34,1.56,.64,1) forwards}
.egg-dot{width:6px;height:6px;border-radius:50%;background:#1e1e1e;transition:background .15s}
.egg-dot.lit{background:var(--spy)}
.egg-dots{display:flex;gap:5px;margin-bottom:8px;height:6px}
@keyframes logoBounce{0%{transform:scale(1)}40%{transform:scale(.92)}100%{transform:scale(1)}}
.logo-bounce{animation:logoBounce .18s ease-out}

/* ── PROGRESS ── */
.prog{display:flex;gap:6px;margin-bottom:22px}
.dot{width:7px;height:7px;border-radius:50%;background:#1e1e1e;transition:background .2s}
.dot.done{background:var(--spy)}
.dot.cur{background:#444}

/* ── CARD SHARED ── */
.card-wrap{width:100%;max-width:340px;flex:1;display:flex;align-items:center;justify-content:center}
.card{
  width:min(300px,80vw);
  height:min(420px, calc(var(--tg-viewport-stable-height, var(--vh)) - 140px));
  border-radius:26px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;touch-action:manipulation;position:relative;transition:transform .1s
}
.card:active{transform:scale(.97)}
.card-back{background:radial-gradient(ellipse at 35% 25%,#181818,#0d0d0d);border:2px solid #222;box-shadow:inset 0 1px 0 rgba(255,255,255,.04)}
.back-icon{font-size:3rem;opacity:.1;margin-bottom:14px}
.back-lbl{font-size:.7rem;color:#2a2a2a;letter-spacing:2.5px;text-transform:uppercase;margin-bottom:6px}
.back-num{font-size:5.5rem;font-weight:900;color:#1c1c1c;line-height:1}
.back-hint{position:absolute;bottom:22px;font-size:.7rem;color:#272727;letter-spacing:1.5px;text-transform:uppercase}
.card-player{background:linear-gradient(150deg,#0c1c2e 0%,#060c18 100%);border:2px solid #18304a;box-shadow:0 0 40px rgba(24,107,181,.1),inset 0 0 60px rgba(0,0,0,.3)}
.card-spy{background:linear-gradient(150deg,#1c0a04 0%,#080306 100%);border:2px solid #3d1208;box-shadow:0 0 40px rgba(255,107,53,.12),inset 0 0 60px rgba(0,0,0,.3)}
.nbabadge{font-size:.6rem;letter-spacing:4px;color:#1e3a55;text-transform:uppercase;margin-bottom:20px}
.pname{font-size:1.75rem;font-weight:900;text-align:center;line-height:1.15;padding:0 18px;margin-bottom:10px}
.pteam{font-size:.75rem;color:#2a4a65;letter-spacing:2px;text-transform:uppercase}
.spy-emoji{font-size:4.5rem;margin-bottom:18px}
.spy-lbl{font-size:2.3rem;font-weight:900;color:var(--spy);letter-spacing:7px;text-shadow:0 0 30px rgba(255,107,53,.4)}
.hide-hint{position:absolute;bottom:22px;font-size:.7rem;color:#252525;letter-spacing:1.5px;text-transform:uppercase}

@keyframes pop{0%{transform:scale(.88);opacity:0}100%{transform:scale(1);opacity:1}}
.pop{animation:pop .18s ease-out}

/* ── DISCUSSION ── */
.disc-icon{font-size:3.2rem;margin-bottom:18px}
.disc-title{font-size:1.5rem;font-weight:800;margin-bottom:10px;text-align:center}
.disc-hint{font-size:.88rem;color:var(--muted);text-align:center;line-height:1.65;max-width:270px;margin-bottom:36px}

/* ── RESULT ── */
.res-lbl{font-size:.65rem;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-bottom:8px;text-align:center}
.res-name{font-size:2rem;font-weight:900;text-align:center;margin-bottom:4px}
.res-team{font-size:.8rem;color:var(--muted);letter-spacing:1.5px;text-align:center;margin-bottom:28px}
.spy-reveal{font-size:.9rem;color:var(--spy);margin-bottom:36px;text-align:center;line-height:1.6}
</style>
</head>
<body>

<!-- ════ SETUP ════ -->
<div class="screen active" id="s-setup">
  <div class="egg-dots" id="egg-dots"></div>
  <div class="logo" id="logo-tap" onclick="easterEgg()">NBA<br><span>SPY</span></div>
  <div class="tagline">Найди шпиона среди своих</div>

  <div class="lbl">Режим</div>
  <div class="pills">
    <button class="pill on" id="m-current"  onclick="setMode('current',this)">Current</button>
    <button class="pill"    id="m-alltime"  onclick="setMode('alltime',this)">All-Time</button>
  </div>

  <div class="lbl">Сложность&nbsp;&nbsp;<span style="color:#333;font-size:.6rem;letter-spacing:1px">1=популярные · 5=неизвестные</span></div>
  <div class="pills">
    <button class="pill diff on" onclick="setDiff(1,this)">1</button>
    <button class="pill diff"    onclick="setDiff(2,this)">2</button>
    <button class="pill diff"    onclick="setDiff(3,this)">3</button>
    <button class="pill diff"    onclick="setDiff(4,this)">4</button>
    <button class="pill diff"    onclick="setDiff(5,this)">5</button>
  </div>

  <div class="lbl">Количество игроков</div>
  <div class="cnt-row">
    <button class="cnt-btn" onclick="chgCount(-1)">−</button>
    <div class="cnt-num" id="cnt">4</div>
    <button class="cnt-btn" onclick="chgCount(1)">+</button>
  </div>

  <button class="btn" onclick="startGame()">Начать игру</button>
  <button class="btn-jazz" id="btn-jazz" onclick="startJazz()">🎷 Utah Jazz · Secret Level</button>
</div>

<!-- ════ DEAL ════ -->
<div class="screen" id="s-deal">
  <div class="prog" id="prog1"></div>
  <div class="card-wrap">
    <div class="card card-back" onclick="revealCard()">
      <div class="back-icon">🏀</div>
      <div class="back-lbl">Игрок</div>
      <div class="back-num" id="deal-num">1</div>
      <div class="back-hint">Нажми</div>
    </div>
  </div>
</div>

<!-- ════ REVEAL ════ -->
<div class="screen" id="s-reveal">
  <div class="prog" id="prog2"></div>
  <div class="card-wrap">
    <div class="card pop" id="rev-card" onclick="nextCard()">
      <div id="rev-content"></div>
      <div class="hide-hint">Нажми чтобы скрыть</div>
    </div>
  </div>
</div>

<!-- ════ DISCUSSION ════ -->
<div class="screen" id="s-disc">
  <div class="disc-icon">🕵️</div>
  <div class="disc-title">Найдите шпиона!</div>
  <p class="disc-hint">Задавайте вопросы об игроке НБА.<br>Шпион не знает кто это — попробуйте его раскрыть.</p>
  <button class="btn" onclick="showResult()">Раскрыть ответ</button>
  <button class="btn btn-ghost" onclick="goHome()">В меню</button>
</div>

<!-- ════ RESULT ════ -->
<div class="screen" id="s-result">
  <div class="res-lbl">Загаданный игрок</div>
  <div class="res-name" id="r-name"></div>
  <div class="res-team" id="r-team"></div>
  <div class="spy-reveal" id="r-spy"></div>
  <button class="btn" onclick="startGame()">Играть снова</button>
  <button class="btn btn-ghost" onclick="goHome()">В меню</button>
</div>

<script>
// ══════════════════════════════════════════════════════════
//  TELEGRAM WEB APP INIT
// ══════════════════════════════════════════════════════════
const tg = window.Telegram?.WebApp;

(function initTg() {
  if (!tg) return;
  tg.ready();
  tg.expand();
  tg.setHeaderColor('#090909');
  tg.setBackgroundColor('#090909');

  // Sync viewport height to CSS variable
  function syncVh() {
    const h = tg.viewportStableHeight || window.innerHeight;
    document.documentElement.style.setProperty('--tg-viewport-stable-height', h + 'px');
  }
  tg.onEvent('viewportChanged', syncVh);
  syncVh();
})();

function haptic(style) {
  tg?.HapticFeedback?.impactOccurred(style || 'light');
}
function hapticNotify(type) {
  tg?.HapticFeedback?.notificationOccurred(type || 'success');
}

// Back button handling
const screenBack = {
  's-deal':    () => show('s-setup'),
  's-reveal':  () => nextCard(),
  's-disc':    () => show('s-setup'),
  's-result':  () => show('s-setup'),
};
if (tg?.BackButton) {
  tg.BackButton.onClick(() => {
    const active = document.querySelector('.screen.active');
    const fn = active && screenBack[active.id];
    if (fn) fn();
  });
}

// ══════════════════════════════════════════════════════════
//  EASTER EGG — 5 taps on logo → Jazz secret level
// ══════════════════════════════════════════════════════════
let eggTaps = 0, eggTimer = null, eggUnlocked = false;

function easterEgg() {
  haptic('light');
  const logo = document.getElementById('logo-tap');
  logo.classList.remove('logo-bounce');
  void logo.offsetWidth;
  logo.classList.add('logo-bounce');

  clearTimeout(eggTimer);
  eggTaps++;
  renderEggDots();

  if (eggTaps >= 5) {
    eggTaps = 0;
    eggUnlocked = true;
    renderEggDots();
    const btn = document.getElementById('btn-jazz');
    btn.style.display = 'block';
    btn.classList.remove('egg-appear');
    void btn.offsetWidth;
    btn.classList.add('egg-appear');
    hapticNotify('success');
    tg?.showAlert('🎷 Секретный уровень разблокирован!\nТолько игроки Utah Jazz.');
  } else {
    eggTimer = setTimeout(() => { eggTaps = 0; renderEggDots(); }, 1800);
  }
}

function renderEggDots() {
  const wrap = document.getElementById('egg-dots');
  wrap.innerHTML = '';
  for (let i = 0; i < 5; i++) {
    const d = document.createElement('div');
    d.className = 'egg-dot' + (i < eggTaps ? ' lit' : '');
    wrap.appendChild(d);
  }
}

function startJazz() {
  haptic('medium');
  G.player = JAZZ_DB[Math.floor(Math.random() * JAZZ_DB.length)];
  const spyAt = Math.floor(Math.random() * S.count);
  G.cards = Array.from({length: S.count}, (_, i) => i === spyAt ? 'spy' : 'player');
  G.idx = 0;
  buildDots();
  updDeal();
  show('s-deal');
}

  S.mode = m;

  el.classList.add('on');
  haptic();
}
function setDiff(d, el) {
  S.diff = d;
  document.querySelectorAll('.diff').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
  haptic();
}
function chgCount(d) {
  S.count = Math.max(2, Math.min(10, S.count + d));
  document.getElementById('cnt').textContent = S.count;
  haptic();
}

// ══════════════════════════════════════════════════════════
//  GAME
// ══════════════════════════════════════════════════════════
function pool() {
  return DB.filter(p => p.lv === S.diff && (S.mode === 'alltime' || p.c === 1));
}

function startGame() {
  const p = pool();
  if (!p.length) {
    tg?.showAlert('Нет игроков для этих настроек.\nПопробуй All-Time или другую сложность.');
    return;
  }
  haptic('medium');
  G.player = p[Math.floor(Math.random() * p.length)];
  const spyAt = Math.floor(Math.random() * S.count);
  G.cards = Array.from({length: S.count}, (_,i) => i === spyAt ? 'spy' : 'player');
  G.idx = 0;
  buildDots();
  updDeal();
  show('s-deal');
}

function buildDots() {
  ['prog1','prog2'].forEach(id => {
    const el = document.getElementById(id);
    el.innerHTML = '';
    for (let i = 0; i < S.count; i++) {
      const d = document.createElement('div');
      d.className = 'dot';
      el.appendChild(d);
    }
  });
}

function updDots() {
  ['prog1','prog2'].forEach(id => {
    document.querySelectorAll('#'+id+' .dot').forEach((d,i) => {
      d.className = 'dot' + (i < G.idx ? ' done' : i === G.idx ? ' cur' : '');
    });
  });
}

function updDeal() {
  document.getElementById('deal-num').textContent = G.idx + 1;
  updDots();
}

function revealCard() {
  haptic('medium');
  const role = G.cards[G.idx];
  const card = document.getElementById('rev-card');
  const cont = document.getElementById('rev-content');
  card.classList.remove('pop');
  void card.offsetWidth;
  card.classList.add('pop');
  if (role === 'spy') {
    hapticNotify('warning');
    card.className = 'card pop card-spy';
    cont.innerHTML = `<div class="spy-emoji">🕵️</div><div class="spy-lbl">ШПИОН</div>`;
  } else {
    card.className = 'card pop card-player';
    cont.innerHTML = `<div class="nbabadge">NBA PLAYER</div><div class="pname">${G.player.n}</div><div class="pteam">${G.player.t}</div>`;
  }
  show('s-reveal');
}

function nextCard() {
  haptic('light');
  G.idx++;
  if (G.idx >= S.count) {
    show('s-disc');
  } else {
    updDeal();
    show('s-deal');
  }
}

function showResult() {
  hapticNotify('success');
  document.getElementById('r-name').textContent = G.player.n;
  document.getElementById('r-team').textContent = G.player.t;
  const spies = G.cards.map((r,i) => r==='spy' ? 'Игрок '+(i+1) : null).filter(Boolean).join(', ');
  document.getElementById('r-spy').innerHTML = `🕵️ Шпион: <strong>${spies}</strong>`;
  show('s-result');
}

function goHome() { haptic(); show('s-setup'); }

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  // Telegram BackButton
  if (tg?.BackButton) {
    id === 's-setup' ? tg.BackButton.hide() : tg.BackButton.show();
  }
}
</script>
